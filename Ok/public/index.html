<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoTrack - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="desi-pattern-overlay"></div>
  <div class="login-container glass-card">
    <div class="brand">
      <h1 class="desi-title">GeoTrack</h1>
      <p class="subtitle">Municipal Workforce & Attendance Tracker</p>
    </div>
    <form id="loginForm" class="login-form">
      <div class="input-group">
        <label for="phone">Phone Number / ID</label>
        <input type="text" id="phone" name="phone" placeholder="Enter your ID" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn primary-btn">Secure Login</button>
      <div id="loginError" class="error-msg hide">Invalid credentials. Try 'admin' / 'admin'.</div>
    </form>
    <div class="login-footer">
      <p>Initiative for Sustainable Cities & Communities (SDG 11)</p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
